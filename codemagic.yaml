workflows:
  fitness-island-ios:
    name: 动森训练岛 iOS
    max_build_duration: 30
    environment:
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 20
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Manual Capacitor sync
        script: |
          mkdir -p ios/App/App/public
          cp -r www/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/capacitor.config.json
      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=\$DEVELOPMENT_TEAM"
    artifacts:
      - build/ios/ipa/*.ipa
