name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (Simulator)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      - name: Find .app
        id: find
        run: |
          APP=$(find ios/App/build -name "App.app" -type d | head -1)
          echo "Found: $APP"
          echo "app_path=$APP" >> $GITHUB_OUTPUT

      - name: Package .app
        run: |
          cp -r "${{ steps.find.outputs.app_path }}" ./动森训练岛.app
          zip -r 动森训练岛-Simulator.zip 动森训练岛.app

      - uses: actions/upload-artifact@v4
        with:
          name: fitness-island-simulator
          path: 动森训练岛-Simulator.zip
