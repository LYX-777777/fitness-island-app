name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO
        continue-on-error: true

      - name: Find .app
        id: find
        run: |
          APP=$(find ios/App/build -name "*.app" -type d | head -1)
          echo "Found: $APP"
          echo "app_path=$APP" >> $GITHUB_OUTPUT

      - name: Package .ipa
        run: |
          mkdir Payload
          cp -r "${{ steps.find.outputs.app_path }}" Payload/
          zip -r 动森训练岛.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: fitness-island-ios
          path: 动森训练岛.ipa
