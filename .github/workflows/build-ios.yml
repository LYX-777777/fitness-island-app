name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Manual Capacitor sync
        run: |
          mkdir -p ios/App/App/public
          cp -r www/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/capacitor.config.json

      - name: Resolve Swift Package Dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -workspace App.xcworkspace -scheme App

      - name: Build iOS (Simulator)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

      - name: Find .app
        id: find
        run: |
          find ios/App/build -name "*.app" -type d
          APP=$(find ios/App/build -name "App.app" -type d | head -1)
          echo "Found: $APP"
          echo "app_path=$APP" >> $GITHUB_OUTPUT

      - name: Package .app
        run: |
          cp -r "${{ steps.find.outputs.app_path }}" ./动森训练岛.app
          zip -r 动森训练岛-Simulator.zip 动森训练岛.app

      - uses: actions/upload-artifact@v4
        with:
          name: fitness-island-simulator
          path: 动森训练岛-Simulator.zip
